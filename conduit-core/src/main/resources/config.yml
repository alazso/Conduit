# Conduit configuration.
# A economy abstraction layer; most behaviour comes from the active
# economy provider. These settings control Conduit's own runtime features.

update-checker:
  # Query GitHub on startup for a newer Conduit release and log a notification.
  enabled: true

metrics:
  # Anonymous usage metrics and error reporting via FastStats (https://faststats.dev). To disable metrics, set this to false.
  enabled: true
  # Verbose FastStats logging; leave false in production.
  debug: false

economy:
  # Force a specific economy provider by name, regardless of registration
  # priority. Leave empty for automatic (highest-priority) selection.
  provider-override: ""
